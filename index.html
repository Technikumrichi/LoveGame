<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <script defer src="js/java.js"></script>
    <title>Memory Spiel</title>
</head>
<body>
    <div class="infobox">
        <div class="labels">
            Spieler: <strong id="username"></strong>
        </div>
    </div>

    <div id="spielbereich"></div>

    <div class="infobox">
        <div class="labels">
            Versuche: <strong id="attempts">0</strong>
        </div>
    </div>

    <div class="infobox">
        <div class="labels">
            Zeit: <strong id="time">0s</strong>
        </div>
    </div>
</body>
</html>
